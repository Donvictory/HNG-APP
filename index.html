<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Todo Card</title>
    <meta
      name="description"
      content="An enhanced, accessible, and responsive task card task."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="container">
      <article
        class="todo-card priority-high"
        id="todo-card"
        data-testid="test-todo-card"
        role="region"
        aria-labelledby="todo-title"
      >
        <div class="card-content-view">
          <header class="todo-header">
            <div class="checkbox-wrapper">
              <input
                type="checkbox"
                id="todo-toggle"
                class="real-checkbox"
                data-testid="test-todo-complete-toggle"
                aria-label="Mark task as complete"
              />
              <label for="todo-toggle" class="sr-only">Complete Toggle</label>
            </div>
            <div class="meta-info">
              <div class="badge-row">
                <span
                  class="badge priority-badge-high"
                  data-testid="test-todo-priority"
                  aria-label="Priority: High"
                >
                  <span
                    class="priority-dot"
                    data-testid="test-todo-priority-indicator"
                  ></span>
                  <span id="priority-display">High</span>
                </span>
                <span
                  id="status-display"
                  class="badge status-badge-pending"
                  data-testid="test-todo-status"
                  aria-label="Current status: Pending"
                >
                  Pending
                </span>
              </div>
              <div class="status-control-wrapper">
                <label for="status-control" class="sr-only"
                  >Change Status</label
                >
                <select
                  id="status-control"
                  class="status-select"
                  data-testid="test-todo-status-control"
                  aria-label="Change task status"
                >
                  <option value="Pending">Pending</option>
                  <option value="In Progress">In Progress</option>
                  <option value="Done">Done</option>
                </select>
              </div>
            </div>
          </header>

          <h2 id="todo-title" class="todo-title" data-testid="test-todo-title">
            Todo Task Card
          </h2>

          <div class="todo-desc-container">
            <div
              id="todo-desc-section"
              class="collapsible-content collapsed"
              data-testid="test-todo-collapsible-section"
            >
              <p class="todo-desc" data-testid="test-todo-description">
                Finish HNG Task, Make sure it is responsive and accessible. This
                description is now potentially very long to demonstrate the
                expand and collapse behavior that has been implemented in this
                stage.
              </p>
            </div>
            <button
              type="button"
              id="expand-toggle"
              class="expand-btn"
              data-testid="test-todo-expand-toggle"
              aria-expanded="false"
              aria-controls="todo-desc-section"
            >
              <span class="btn-text">Show more</span>
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
          </div>

          <div class="date-section">
            <div class="due-date-row">
              <div class="due-date-val">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <time
                  id="due-date-display"
                  data-testid="test-todo-due-date"
                  datetime="2026-04-12T18:00:00Z"
                >
                  Due Apr 12, 2026
                </time>
              </div>
              <span
                class="overdue-indicator"
                data-testid="test-todo-overdue-indicator"
                >Overdue</span
              >
            </div>
            <time
              id="time-remaining"
              class="time-remaining"
              data-testid="test-todo-time-remaining"
              aria-live="polite"
            >
              Calculating...
            </time>
          </div>

          <div role="list" class="tags-list" data-testid="test-todo-tags">
            <div
              role="listitem"
              class="tag-item"
              data-testid="test-todo-tag-work"
            >
              Work
            </div>
            <div
              role="listitem"
              class="tag-item"
              data-testid="test-todo-tag-urgent"
            >
              Urgent
            </div>
            <div role="listitem" class="tag-item">Design</div>
          </div>

          <footer class="card-actions">
            <button
              type="button"
              id="edit-btn"
              class="btn btn-edit"
              data-testid="test-todo-edit-button"
              aria-label="Edit task"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                ></path>
                <path
                  d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                ></path>
              </svg>
              Edit
            </button>
            <button
              type="button"
              id="delete-btn"
              class="btn btn-delete"
              data-testid="test-todo-delete-button"
              aria-label="Delete task"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="3 6 5 6 21 6"></polyline>
                <path
                  d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                ></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
              </svg>
              Delete
            </button>
          </footer>
        </div>

        <form
          id="edit-form"
          class="edit-form"
          data-testid="test-todo-edit-form"
          aria-label="Edit Task Form"
        >
          <div class="form-group">
            <label for="edit-title" class="form-label">Title</label>
            <input
              type="text"
              id="edit-title"
              class="form-input"
              data-testid="test-todo-edit-title-input"
              required
            />
          </div>
          <div class="form-group">
            <label for="edit-desc" class="form-label">Description</label>
            <textarea
              id="edit-desc"
              class="form-textarea"
              data-testid="test-todo-edit-description-input"
            ></textarea>
          </div>
          <div class="form-group">
            <label for="edit-priority" class="form-label">Priority</label>
            <select
              id="edit-priority"
              class="form-select"
              data-testid="test-todo-edit-priority-select"
            >
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-due-date" class="form-label">Due Date</label>
            <input
              type="datetime-local"
              id="edit-due-date"
              class="form-input"
              data-testid="test-todo-edit-due-date-input"
            />
          </div>
          <div class="edit-actions">
            <button
              type="submit"
              class="btn btn-save"
              data-testid="test-todo-save-button"
            >
              Save Changes
            </button>
            <button
              type="button"
              id="cancel-btn"
              class="btn btn-cancel"
              data-testid="test-todo-cancel-button"
            >
              Cancel
            </button>
          </div>
        </form>
      </article>
    </main>

    <script src="index.js"></script>
  </body>
</html>
