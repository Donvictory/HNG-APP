<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Task Card</title>
    <meta
      name="description"
      content="A clean, accessible, and responsive task card component built with vanilla HTML, CSS, and JS."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="container">
      <article
        class="todo-card"
        data-testid="test-todo-card"
        role="region"
        aria-labelledby="todo-title"
      >
        <header class="todo-header">
          <div class="checkbox-wrapper">
            <input
              type="checkbox"
              id="todo-toggle"
              class="real-checkbox"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
            />
            <label for="todo-toggle" class="sr-only">Complete Toggle</label>
          </div>
          <div class="meta-row">
            <span
              class="badge priority-high"
              data-testid="test-todo-priority"
              aria-label="Priority: High"
            >
              🔥 High
            </span>
            <span
              id="status-indicator"
              class="badge status-pending"
              data-testid="test-todo-status"
              aria-label="Current status: Pending"
            >
              Pendings
            </span>
          </div>
        </header>

        <h2 id="todo-title" class="todo-title" data-testid="test-todo-title">
          Todo Task Card
        </h2>

        <p class="todo-desc" data-testid="test-todo-description">
          Finish HNG Task, Make sure it is responsive and accessible.
        </p>

        <div class="date-info">
          <div class="due-date">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <time
              data-testid="test-todo-due-date"
              datetime="2026-04-12T18:00:00Z"
            >
              Due Apr 12, 2026
            </time>
          </div>
          <time
            id="time-remaining"
            class="time-remaining"
            data-testid="test-todo-time-remaining"
            aria-live="polite"
          >
            Calculating...
          </time>
        </div>

        <div role="list" class="tags-list" data-testid="test-todo-tags">
          <div
            role="listitem"
            class="tag-item"
            data-testid="test-todo-tag-work"
          >
            Work
          </div>
          <div
            role="listitem"
            class="tag-item"
            data-testid="test-todo-tag-urgent"
          >
            Urgent
          </div>
          <div role="listitem" class="tag-item">Design</div>
        </div>

        <footer class="card-actions">
          <button
            type="button"
            class="btn btn-edit"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              ></path>
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              ></path>
            </svg>
            Edit
          </button>
          <button
            type="button"
            class="btn btn-delete"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6"></polyline>
              <path
                d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
              ></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
            Delete
          </button>
        </footer>
      </article>
    </main>

    <script src="index.js"></script>
  </body>
</html>
